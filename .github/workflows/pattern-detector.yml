name: Pattern Detector Bot

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pattern-detection:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run Pattern Detection Bot
        run: node index.js

      - name: Commit and push updates
        run: |
          git config --global user.email "bot@detector-byte.com"
          git config --global user.name "Pattern Bot"

          if [[ `git status --porcelain` ]]; then
            git add -A
            git commit -m "🤖 Pattern signals updated - $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Log execution
        if: always()
        run: |
          echo "✅ Bot execution completed at $(date)"
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: Pattern Detector Bot"
